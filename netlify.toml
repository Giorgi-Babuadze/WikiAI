[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["@google/genai"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/api/:splat"
  status = 200

[[redirects]]
  from = "/welcome"
  to = "/.netlify/functions/api/welcome"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
